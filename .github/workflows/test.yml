name: Tests
on:
  workflow_dispatch:
  pull_request:
  push:

jobs:
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install bandit
        run: uv tool install bandit[toml]

      - name: Run bandit security scan
        run: bandit -c pyproject.toml -r nac_test/ -ll -f json -o bandit-security-report.json
        
      - name: Upload security report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: bandit-security-report
          path: bandit-security-report.json

  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write  # Required for dependabot to push lock file updates
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          # For fork PRs, use merge commit; for same-repo PRs, use head ref
          ref: ${{ github.event.pull_request.head.sha || github.head_ref }}

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install mypy
        run: uv tool install mypy

      - name: Update lock file
        # Only run for dependabot on same-repo PRs (not forks)
        if: github.actor == 'dependabot[bot]' && github.event.pull_request.head.repo.full_name == github.repository
        run: |
          uv lock
          if [[ -n $(git status --porcelain uv.lock) ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add uv.lock
            git commit -m "chore: update uv.lock [dependabot skip]"
            git push
          fi

      - name: Check License Headers
        run: bash scripts/license-headers.sh

      - name: Pre-commit Checks
        uses: pre-commit/action@v3.0.1

  test:
    name: Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      matrix:
        python:
          - "3.10"
          - "3.11"
          - "3.12"
          - "3.13"
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Python ${{ matrix.python }}
        run: uv python install ${{ matrix.python }}

      - name: Test
        run: |
          uv sync --extra dev
          # Run tests in parallel (--dist loadscope keeps test classes together, this is critical for e2e tests)
          # E2E tests are excluded here and run separately in the test-e2e job via uv tool install
          uv run pytest -n auto --dist loadscope tests/ --ignore=tests/e2e

  test-e2e:
    name: Tests (E2E)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      matrix:
        python:
          - "3.10"
          - "3.11"
          - "3.12"
          - "3.13"
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Python ${{ matrix.python }}
        run: uv python install ${{ matrix.python }}

      - name: Install nac-test via uv tool install
        # Installs nac-test and test dependencies into a single isolated tool
        # environment (separate venv). Running pytest from within this same env
        # means no dev venv exists to shadow the tool env's robot binary —
        # reproducing the real end-user scenario and catching regressions like #718.
        run: uv tool install --python ${{ matrix.python }} --with pytest --with pytest-xdist --with pytest-httpserver --with flask .

      - name: Verify nac-test entrypoint resolves to uv tool install
        # Confirm the nac-test on PATH comes from the uv tool environment, not the
        # dev venv or system. This guards against the test silently exercising the
        # wrong entrypoint and missing regressions like #718.
        run: |
          TOOL_BIN=$(uv tool dir --bin)
          NACTST=$(which nac-test)
          echo "uv tool bin dir: $TOOL_BIN"
          echo "nac-test resolves to: $NACTST"
          if [[ "$NACTST" != "$TOOL_BIN/nac-test" ]]; then
            echo "ERROR: nac-test ($NACTST) is not the uv tool install ($TOOL_BIN/nac-test)"
            exit 1
          fi

      - name: Run E2E tests
        # pytest is installed into the nac-test tool env via --with, so it runs
        # in the same isolated venv — no dev venv on PATH to shadow robot.
        run: pytest -n auto --dist loadscope tests/e2e/

  test-windows:
    name: Tests (Windows)
    runs-on: windows-latest
    timeout-minutes: 15
    strategy:
      matrix:
        python:
          - "3.10"
          - "3.11"
          - "3.12"
          - "3.13"
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Python ${{ matrix.python }}
        run: uv python install ${{ matrix.python }}

      - name: Test
        run: |
          uv sync --extra dev
          # Explicit file list: Windows shell doesn't expand globs, and other integration
          # tests import pyats which isn't available on Windows
          uv run pytest -m windows -n auto --dist loadscope tests/e2e tests/integration/test_cli_basic.py tests/integration/test_cli_rendering.py tests/integration/test_cli_ordering.py tests/integration/test_cli_extra_args.py
          uv run nac-test --version

  notification:
    name: Notification
    if: always() && github.event_name != 'pull_request'
    needs: [security, lint, test, test-e2e, test-windows]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check Job Success
        run: |
          if [ ${{ needs.security.result }} == 'success' ] && [ ${{ needs.lint.result }} == 'success' ] && [ ${{ needs.test.result }} == 'success' ] && [ ${{ needs.test-e2e.result }} == 'success' ] && [ ${{ needs.test-windows.result }} == 'success' ]; then
            echo "All jobs succeeded"
            echo "jobSuccess=success" >> $GITHUB_ENV
          else
            echo "Not all jobs succeeded"
            echo "jobSuccess=fail" >> $GITHUB_ENV
          fi
        id: print_status

      - name: Webex Notification
        if: always()
        uses: qsnyder/action-wxt@master
        env:
          TOKEN: ${{ secrets.WEBEX_TOKEN }}
          ROOMID: ${{ secrets.WEBEX_ROOM_ID }}
          MESSAGE: |
            [**[${{ env.jobSuccess }}] ${{ github.repository }} #${{ github.run_number }}**](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})
            * Commit: [${{ github.event.head_commit.message }}](${{ github.event.head_commit.url }})[${{ github.event.pull_request.title }}](${{ github.event.pull_request.html_url }})
            * Author: ${{ github.event.sender.login }}
            * Branch: ${{ github.ref }} ${{ github.head_ref }}
            * Event: ${{ github.event_name }}
