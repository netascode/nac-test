testbed:
  name: nac_test_consolidated_testbed
  credentials:
    default:
      username: '%ENV{IOSXE_USERNAME}'
      password: '%ENV{IOSXE_PASSWORD}'
devices:
  sd-dc-c8kv-01:
    alias: sd-dc-c8kv-01
    os: iosxe
    type: router
    credentials:
      default:
        username: '%ENV{IOSXE_USERNAME}'
        password: '%ENV{IOSXE_PASSWORD}'
    connections:
      cli:
        protocol: ssh
        ip: 10.100.1.1
        port: 22
        arguments:
          init_config_commands: []
          operating_mode: true
    custom:
      abstraction:
        order:
        - os
    platform: sdwan
